<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EhliyetPro - İletişim ve Destek</title>
    <style>
        :root {
            --primary-color: #007AFF; /* iOS Mavi */
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s ease;
            background-color: #fafafa;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #0066cc;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>EhliyetPro Destek Merkezi</h1>
            <p>Uygulama ile ilgili her türlü soru, öneri veya karşılaştığınız sorunlar için formu doldurarak bize ulaşabilirsiniz.</p>
        </div>

        <!-- action kısmına kendi e-posta adresini veya bir form servisi linkini (örn: formspree.io) yazabilirsin -->
        <form action="mailto:destek@burhancengiz.com" method="POST" enctype="text/plain">
            
            <div class="form-group">
                <label for="name">Adınız Soyadınız</label>
                <input type="text" id="name" name="Ad Soyad" class="form-control" placeholder="Adınızı giriniz" required>
            </div>

            <div class="form-group">
                <label for="email">E-posta Adresiniz</label>
                <input type="email" id="email" name="E-posta" class="form-control" placeholder="ornek@email.com" required>
            </div>

            <div class="form-group">
                <label for="subject">Konu</label>
                <input type="text" id="subject" name="Konu" class="form-control" placeholder="Uygulama hatası, Premium abonelik vb." required>
            </div>

            <div class="form-group">
                <label for="message">Mesajınız</label>
                <textarea id="message" name="Mesaj" class="form-control" placeholder="Size nasıl yardımcı olabiliriz?" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Mesajı Gönder</button>

        </form>

        <div class="footer">
            &copy; 2026 EhliyetPro. Tüm hakları saklıdır.
        </div>
    </div>

</body>
</html>
